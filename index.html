<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tra cứu API - CPhI</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0f1419;--card:#1a2129;--card2:#222b35;--accent:#3da9fc;--accent2:#2dd4bf;--text:#e8edf2;--muted:#8a98a8;--border:#2a3540;--warn:#f5a623;--green:#34d399}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:var(--bg);color:var(--text);line-height:1.5;padding-bottom:40px}
header{position:sticky;top:0;z-index:100;background:rgba(15,20,25,.97);backdrop-filter:blur(8px);border-bottom:1px solid var(--border);padding:14px 16px}
.wrap{max-width:1100px;margin:0 auto}
h1{font-size:18px;font-weight:700;letter-spacing:.3px;display:flex;align-items:center;gap:8px}
h1 span{color:var(--accent)}
.sub{font-size:12px;color:var(--muted);margin-top:2px}
#search{width:100%;margin-top:12px;padding:13px 16px;font-size:16px;background:var(--card);border:1.5px solid var(--border);border-radius:12px;color:var(--text);outline:none}
#search:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(61,169,252,.15)}
.stats{font-size:12px;color:var(--muted);margin-top:8px}
.tip{font-size:12px;color:var(--accent2);margin-top:6px}
main{max-width:1100px;margin:0 auto;padding:16px}
.chips{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:18px}
.chip{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:8px 14px;font-size:13px;cursor:pointer;transition:.12s;user-select:none}
.chip:active,.chip.sel{background:var(--accent);color:#06121f;border-color:var(--accent);font-weight:600}
.chip.hide{display:none}
.detail{animation:fade .2s ease}
@keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.hcard{background:linear-gradient(135deg,var(--card),var(--card2));border:1px solid var(--border);border-radius:14px;padding:18px;margin-bottom:18px}
.hcard h2{font-size:22px;color:var(--accent2);margin-bottom:4px}
.hcard .grp{display:inline-block;font-size:11px;background:rgba(61,169,252,.15);color:var(--accent);padding:3px 10px;border-radius:20px;margin-bottom:12px}
.kv{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin-top:8px}
.kv .item{background:rgba(0,0,0,.2);border-radius:8px;padding:8px 11px}
.kv .k{font-size:10.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.4px}
.kv .v{font-size:14px;font-weight:600;margin-top:2px;word-break:break-word}
.section{margin-bottom:22px}
.section-title{font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--border)}
.section-title .badge{background:var(--accent);color:#06121f;font-size:11px;padding:1px 8px;border-radius:20px;font-weight:700;margin-left:6px}
.section-title.imp .badge{background:var(--warn)}
.scard{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:13px;margin-bottom:10px}
.scard .row1{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:6px}
.scard .mfr{font-size:15px;font-weight:600;flex:1}
.scard .meta{display:flex;flex-wrap:wrap;gap:6px;margin:6px 0}
.scard .det{font-size:12.5px;color:var(--muted);margin-top:5px}
.scard .det b{color:var(--text)}
.tag{display:inline-block;font-size:11px;padding:3px 9px;border-radius:6px;background:rgba(255,255,255,.08);white-space:nowrap}
.tag.mfr-t{background:rgba(52,211,153,.18);color:var(--green)}
.tag.trader-t{background:rgba(245,166,35,.18);color:var(--warn)}
.tag.cert{background:rgba(61,169,252,.18);color:var(--accent)}
.tag.price{color:var(--green);font-weight:700}
a.link{color:var(--accent);text-decoration:none}
.muted{color:var(--muted)}
.imp-vn{white-space:pre-line;line-height:1.4}
.back{display:inline-block;margin-bottom:14px;font-size:14px;color:var(--accent);cursor:pointer;user-select:none}
.empty{text-align:center;padding:50px 20px;color:var(--muted)}
.empty .big{font-size:46px;margin-bottom:10px;opacity:.4}
</style>
</head>
<body>
<header>
<div class="wrap">
<h1>🔍 Tra cứu <span>API</span> &middot; CPhI</h1>
<div class="sub">Bấm vào tên hoạt chất bên dưới để xem chi tiết</div>
<input id="search" type="text" placeholder="Lọc nhanh: gõ vài chữ cái..." autocomplete="off">
<div class="stats" id="stats"></div>
</div>
</header>
<main id="main"></main>

function norm(s){return (s||'').toString().replace(/\s+/g,' ').trim().toLowerCase();}
function esc(s){if(s===null||s===undefined)return '';return String(s).replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];});}
function val(v){return (v===null||v===undefined||v==='')?'<span class="muted">—</span>':esc(v);}

var names = [];
var seen = {};
for(var i=0;i<DATA.tong_hop.length;i++){var n=DATA.tong_hop[i]['Hoạt chất (INN)'];if(n&&!seen[norm(n)]){seen[norm(n)]=1;names.push(n);}}
names.sort(function(a,b){return a.localeCompare(b);});

document.getElementById('stats').textContent = DATA.tong_hop.length+' hoạt chất · '+DATA.suppliers.length+' nhà cung cấp · '+DATA.imports.length+' lượt nhập VN';

var main = document.getElementById('main');
var search = document.getElementById('search');

function showList(){
  var h='<div class="chips" id="chips">';
  for(var i=0;i<names.length;i++){
    h+='<div class="chip" data-n="'+esc(names[i])+'">'+esc(names[i])+'</div>';
  }
  h+='</div>';
  main.innerHTML=h;
  var chips=main.querySelectorAll('.chip');
  for(var j=0;j<chips.length;j++){
    chips[j].onclick=function(){render(this.getAttribute('data-n'));};
  }
}

search.addEventListener('input',function(){
  var q=norm(search.value);
  var chips=document.querySelectorAll('#chips .chip');
  if(!chips.length)return;
  for(var i=0;i<chips.length;i++){
    var n=norm(chips[i].getAttribute('data-n'));
    chips[i].className='chip'+(n.indexOf(q)>-1?'':' hide');
  }
});

function kv(k,v){return '<div class="item"><div class="k">'+esc(k)+'</div><div class="v">'+val(v)+'</div></div>';}
function typeTag(t){if(!t)return '';var n=norm(t);var c=(n.indexOf('mfr')>-1||n.indexOf('sx')>-1)?'mfr-t':(n.indexOf('trader')>-1?'trader-t':'');return '<span class="tag '+c+'">'+esc(t)+'</span>';}

  var nn=norm(name);
  var th=DATA.tong_hop.filter(function(r){return norm(r['Hoạt chất (INN)'])===nn;});

      if(r['Xuất xứ'])h+='<span class="tag">🌍 '+esc(r['Xuất xứ'])+'</span>';
      h+='</div>';
      if(r['Đơn vị nhập khẩu (VN)'])h+='<div class="det imp-vn"><b>Đơn vị NK (VN):</b>\n'+esc(r['Đơn vị nhập khẩu (VN)'])+'</div>';
      h+='<div class="meta">';
      if(r['Thời gian nhập lần đầu'])h+='<span class="tag">📅 Đầu: '+esc(r['Thời gian nhập lần đầu'])+'</span>';
      if(r['Thời gian nhập gần nhất'])h+='<span class="tag">📅 Gần nhất: '+esc(r['Thời gian nhập gần nhất'])+'</span>';
      if(r['Đơn giá ước tính'])h+='<span class="tag price">💲'+esc(r['Đơn giá ước tính'])+' '+esc(r['Đồng tiền']||'')+'</span>';
      if(r['Số lượng nhập lớn nhất(kg)'])h+='<span class="tag">SL: '+esc(r['Số lượng nhập lớn nhất(kg)'])+' kg</span>';
      if(r['Mục đích sử dụng (gia công/SX)'])h+='<span class="tag">'+esc(r['Mục đích sử dụng (gia công/SX)'])+'</span>';
      h+='</div></div>';
    }
    h+='</div>';
  }

  h+='</div>';
  main.innerHTML=h;
  document.getElementById('back').onclick=function(){search.value='';showList();window.scrollTo(0,0);};
  window.scrollTo(0,0);
}

showList();
</script>
</body>
